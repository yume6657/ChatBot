{% extends 'base.html' %}

{% block title %}登录 - DeepSeek智能对话系统{% endblock %}

{% block content %}
<h2>用户登录</h2>

{% if form.errors %}
    <div class="error">
        用户名或密码错误，请重试。
    </div>
{% endif %}

<form method="post" style="max-width: 400px; margin: 30px auto;">
    {% csrf_token %}
    
    <div class="form-group">
        <label for="id_username">用户名:</label>
        {{ form.username }}
    </div>
    
    <div class="form-group">
        <label for="id_password">密码:</label>
        {{ form.password }}
    </div>
    
    <button type="submit" class="btn" style="width: 100%;">登录</button>
</form>

<div style="text-align: center; margin-top: 20px;">
    <p>还没有账号？ <a href="{% url 'register' %}">立即注册</a></p>
</div>
{% endblock %}
